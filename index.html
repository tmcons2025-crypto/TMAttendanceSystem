<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM Construction Corporation Attendance System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: 20px auto; display: none; }
        
        /* Buttons */
        .btn { padding: 25px 50px; font-size: 24px; margin: 10px; cursor: pointer; border: none; color: white; font-weight: bold; border-radius: 10px; }
        .btn-in { background-color: #28a745; }
        .btn-out { background-color: #dc3545; }

        /* Full Screen Overlay Message */
        #message-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none; justify-content: center; align-items: center;
            font-size: 32px; font-weight: bold; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="message-overlay"></div>

    <h1>Work Attendance</h1>
    <div id="controls">
        <button class="btn btn-in" onclick="startScanner('TIME IN')">TIME IN</button>
        <button class="btn btn-out" onclick="startScanner('TIME OUT')">TIME OUT</button>
    </div>
    
    <h2 id="status">Please select an action</h2>
    <div id="reader"></div>

    <script>
        let html5QrcodeScanner = null;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZDjUgPXuO7KvmCzyKqebcCg5wG2x30AXJ3p2SmtoL7iK8fXuj2qCDLwNxAopTchcA/exec";

        function playBeep() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 880; gain.gain.value = 0.1;
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        async function startScanner(mode) {
            if (html5QrcodeScanner) await html5QrcodeScanner.clear();

            document.getElementById('status').innerText = "Mode: " + mode + " - Scanning...";
            document.getElementById('reader').style.display = "block";

            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            
            html5QrcodeScanner.render(async (decodedText) => {
                // --- ANTI-DOUBLE SCAN LOGIC ---
                const lastAction = localStorage.getItem(decodedText);
                if (lastAction === mode) {
                    alert("ERROR: You are already logged " + mode + ". Please perform the opposite action first.");
                    return; // Stop here if trying to do the same thing twice
                }

                await html5QrcodeScanner.clear();
                document.getElementById('reader').style.display = "none";
                
                // Update local storage
                localStorage.setItem(decodedText, mode);
                
                // Show overlay and play sound
                playBeep();
                const msgDiv = document.getElementById('message-overlay');
                msgDiv.innerText = decodedText + "\nYOU ARE NOW " + mode;
                msgDiv.style.display = "flex";

                // Send to Google Sheets
                try {
                    await fetch(SCRIPT_URL, {
                        method: "POST", mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name: decodedText, action: mode })
                    });
                } catch (err) {
                    console.error("Sync error");
                }

                // Reset dashboard after 3 seconds
                setTimeout(() => {
                    msgDiv.style.display = "none";
                    document.getElementById('status').innerText = "Please select an action";
                }, 3000);
            });
        }
    </script>
</body>
</html>
