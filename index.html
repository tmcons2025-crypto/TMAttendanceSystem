<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM Construction Attendance</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: 20px auto; display: none; }
        .btn { padding: 15px 30px; font-size: 20px; margin: 10px; cursor: pointer; border: none; color: white; font-weight: bold; border-radius: 8px; }
        .btn-in { background-color: #28a745; }
        .btn-out { background-color: #dc3545; }
        #custom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 40px; border-radius: 20px; width: 80%; max-width: 400px; }
    </style>
</head>
<body>

    <div id="custom-modal">
        <div class="modal-content">
            <h2 id="modal-text"></h2>
            <button onclick="closeModal()" style="padding:10px 20px;">OKAY</button>
        </div>
    </div>

    <h1>TM Construction Attendance</h1>
    <div id="controls">
        <button class="btn btn-in" onclick="startScanner('TIME IN')">TIME IN</button>
        <button class="btn btn-out" onclick="startScanner('TIME OUT')">TIME OUT</button>
    </div>
    <div id="reader"></div>

    <script>
        // REPLACE THIS URL WITH YOUR NEW DEPLOYMENT URL
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZDjUgPXuO7KvmCzyKqebcCg5wG2x30AXJ3p2SmtoL7iK8fXuj2qCDLwNxAopTchcA/exec";
        let scanner = null;

        function showCustomAlert(msg) {
            document.getElementById('modal-text').innerText = msg;
            document.getElementById('custom-modal').style.display = "flex";
        }
        function closeModal() { document.getElementById('custom-modal').style.display = "none"; }

        async function startScanner(mode) {
            if (scanner) await scanner.clear();
            document.getElementById('reader').style.display = "block";
            scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            
            scanner.render(async (decodedText) => {
                await scanner.clear();
                document.getElementById('reader').style.display = "none";
                
                // Record to Sheet via GET request
                try {
                    const url = `${SCRIPT_URL}?name=${encodeURIComponent(decodedText)}&action=${encodeURIComponent(mode)}`;
                    const response = await fetch(url);
                    const result = await response.json();
                    
                    if(result.status === "success") {
                        showCustomAlert("Success: " + decodedText + " recorded for " + mode);
                    }
                } catch (err) {
                    showCustomAlert("Connection Error. Please check your internet.");
                }
            });
        }
    </script>
</body>
</html>
