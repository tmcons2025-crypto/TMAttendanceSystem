<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM Construction Corporation Attendance System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        #reader { width: 100%; max-width: 500px; margin: 20px auto; display: none; }
        
        .btn { padding: 15px 30px; font-size: 20px; margin: 10px; cursor: pointer; border: none; color: white; font-weight: bold; border-radius: 8px; }
        .btn-in { background-color: #28a745; }
        .btn-out { background-color: #dc3545; }

        /* Custom Modal Styling */
        #custom-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 50px; border-radius: 20px;
            text-align: center; width: 80%; max-width: 500px;
        }
        .modal-btn {
            padding: 20px 60px; font-size: 24px; background: #007bff;
            color: white; border: none; border-radius: 10px;
            margin-top: 30px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="custom-modal">
        <div class="modal-content">
            <h2 id="modal-text" style="font-size: 32px;"></h2>
            <button class="modal-btn" onclick="closeModal()">OKAY</button>
        </div>
    </div>

    <h1>Work Attendance</h1>
    <div id="controls">
        <button class="btn btn-in" onclick="startScanner('TIME IN')">TIME IN</button>
        <button class="btn btn-out" onclick="startScanner('TIME OUT')">TIME OUT</button>
    </div>
    
    <h2 id="status">Please select an action</h2>
    <div id="reader"></div>

    <script>
        let html5QrcodeScanner = null;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZDjUgPXuO7KvmCzyKqebcCg5wG2x30AXJ3p2SmtoL7iK8fXuj2qCDLwNxAopTchcA/exec";

        function playBeep() {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = 880; gain.gain.value = 0.1;
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        }

        function showCustomAlert(message) {
            document.getElementById('modal-text').innerText = message;
            document.getElementById('custom-modal').style.display = "flex";
        }

        function closeModal() {
            document.getElementById('custom-modal').style.display = "none";
        }

        async function startScanner(mode) {
            if (html5QrcodeScanner) await html5QrcodeScanner.clear();

            document.getElementById('status').innerText = "Mode: " + mode + " - Scanning...";
            document.getElementById('reader').style.display = "block";

            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            
            html5QrcodeScanner.render(async (decodedText) => {
                document.getElementById('status').innerText = "Checking status...";
                
                try {
                    const checkResponse = await fetch(SCRIPT_URL + "?name=" + encodeURIComponent(decodedText));
                    const checkData = await checkResponse.json();
                    
                    if (checkData.lastAction === mode) {
                        showCustomAlert("ERROR: You are already logged " + mode + ". Please perform the opposite action first.");
                        await html5QrcodeScanner.clear();
                        document.getElementById('reader').style.display = "none";
                        document.getElementById('status').innerText = "Please select an action";
                        return;
                    }

                    await html5QrcodeScanner.clear();
                    document.getElementById('reader').style.display = "none";
                    
                    playBeep();
                    await fetch(SCRIPT_URL, {
                        method: "POST", mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name: decodedText, action: mode })
                    });
                    
                    showCustomAlert("Success: " + decodedText + " recorded for " + mode);
                } catch (err) {
                    showCustomAlert("Error: Could not connect to server.");
                }

                document.getElementById('status').innerText = "Please select an action";
            });
        }
    </script>
</body>
</html>
