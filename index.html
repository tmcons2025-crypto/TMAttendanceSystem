<script>
    let html5QrcodeScanner = null;
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZDjUgPXuO7KvmCzyKqebcCg5wG2x30AXJ3p2SmtoL7iK8fXuj2qCDLwNxAopTchcA/exec";

    function playBeep() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.value = 880; gain.gain.value = 0.1;
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    async function startScanner(mode) {
        if (html5QrcodeScanner) await html5QrcodeScanner.clear();

        document.getElementById('status').innerText = "Mode: " + mode + " - Scanning...";
        document.getElementById('reader').style.display = "block";

        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        
        html5QrcodeScanner.render(async (decodedText) => {
            // 1. Check Logic: Prevent double Time In or double Time Out
            const workerName = decodedText;
            const lastAction = localStorage.getItem(workerName);

            if (lastAction === mode) {
                await html5QrcodeScanner.clear();
                document.getElementById('reader').style.display = "none";
                alert("ERROR: You are already logged " + mode + ". Please perform the opposite action first.");
                document.getElementById('status').innerText = "Please select an action";
                return;
            }

            // 2. Success: Proceed with recording
            await html5QrcodeScanner.clear();
            document.getElementById('reader').style.display = "none";
            
            // Save current state to LocalStorage
            localStorage.setItem(workerName, mode);

            playBeep();
            const msgDiv = document.getElementById('message-overlay');
            msgDiv.innerText = workerName + "\nSUCCESS: " + mode;
            msgDiv.style.display = "flex";

            // Send to Google Sheets
            try {
                await fetch(SCRIPT_URL, {
                    method: "POST", mode: "no-cors",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name: workerName, action: mode })
                });
            } catch (err) {
                console.error("Sync error");
            }

            setTimeout(() => {
                msgDiv.style.display = "none";
                document.getElementById('status').innerText = "Please select an action";
            }, 3000);
        });
    }
</script>
