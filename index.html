<!DOCTYPE html>
<html>
<head>
    <title>Attendance System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; }
        #reader { width: 300px; margin: auto; display: none; } /* Hidden by default */
        .btn { padding: 15px 30px; font-size: 18px; margin: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>Work Attendance</h1>
    <div id="controls">
        <button class="btn" onclick="startScanner('TIME IN')">TIME IN</button>
        <button class="btn" onclick="startScanner('TIME OUT')">TIME OUT</button>
    </div>
    
    <h2 id="status">Please select an action</h2>
    <div id="reader"></div>

    <script>
        let html5QrcodeScanner;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZDjUgPXuO7KvmCzyKqebcCg5wG2x30AXJ3p2SmtoL7iK8fXuj2qCDLwNxAopTchcA/exec";

        async function startScanner(mode) {
            document.getElementById('status').innerText = "Mode: " + mode + " - Scanning...";
            document.getElementById('reader').style.display = "block"; // Show camera

            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
            
            html5QrcodeScanner.render(async (decodedText) => {
                // 1. Stop scanning immediately after success
                await html5QrcodeScanner.clear();
                document.getElementById('reader').style.display = "none";
                document.getElementById('status').innerText = "Processing...";

                // 2. Send to Google Sheets
                try {
                    await fetch(SCRIPT_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ name: decodedText, action: mode })
                    });
                    alert("Success: " + decodedText + " recorded for " + mode);
                } catch (err) {
                    alert("Error: Could not connect to server.");
                }

                document.getElementById('status').innerText = "Please select an action";
            });
        }
    </script>
</body>
</html>
