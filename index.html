<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TM Construction Attendance System</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { text-align: center; font-family: sans-serif; padding: 20px; background-color: #f4f7f6; }
        #reader { width: 100%; max-width: 500px; margin: 20px auto; display: none; border: 2px solid #333; }
        .btn { padding: 20px 40px; font-size: 20px; margin: 10px; cursor: pointer; border: none; color: white; font-weight: bold; border-radius: 8px; transition: opacity 0.3s; }
        .btn:active { opacity: 0.7; }
        .btn-in { background-color: #28a745; }
        .btn-out { background-color: #dc3545; }
        #message-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); display: none; 
            justify-content: center; align-items: center;
            font-size: 24px; font-weight: bold; z-index: 100; padding: 20px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="message-overlay"></div>

    <h1>TM Construction</h1>
    <div id="controls">
        <button class="btn btn-in" onclick="startScanner('TIME IN')">TIME IN</button>
        <button class="btn btn-out" onclick="startScanner('TIME OUT')">TIME OUT</button>
    </div>
    
    <h2 id="status">Please select an action</h2>
    <div id="reader"></div>

    <script>
        let html5QrCode = null;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZDjUgPXuO7KvmCzyKqebcCg5wG2x30AXJ3p2SmtoL7iK8fXuj2qCDLwNxAopTchcA/exec";

        function playBeep() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.value = 880; gain.gain.value = 0.1;
            osc.start(); osc.stop(ctx.currentTime + 0.2);
        }

        async function startScanner(mode) {
            document.getElementById('status').innerText = `Mode: ${mode} - Scanning...`;
            document.getElementById('reader').style.display = "block";

            html5QrCode = new Html5Qrcode("reader");

            try {
                // 'ideal' environment ensures rear camera on mobile, falls back to front/webcam on desktop
                await html5QrCode.start(
                    { facingMode: { ideal: "environment" } },
                    { fps: 10, qrbox: 250 },
                    async (decodedText) => {
                        await html5QrCode.stop();
                        document.getElementById('status').innerText = "Checking status...";
                        
                        try {
                            const response = await fetch(`${SCRIPT_URL}?name=${encodeURIComponent(decodedText)}`);
                            const data = await response.json();
                            
                            if (data.lastAction === mode) {
                                alert(`ERROR: You are already logged ${mode}.`);
                                resetUI();
                                return;
                            }

                            playBeep();
                            const msgDiv = document.getElementById('message-overlay');
                            msgDiv.innerText = `${decodedText}\nYOU ARE NOW ${mode}`;
                            msgDiv.style.display = "flex";

                            await fetch(SCRIPT_URL, {
                                method: "POST", mode: "no-cors",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ name: decodedText, action: mode })
                            });

                            setTimeout(() => {
                                msgDiv.style.display = "none";
                                resetUI();
                            }, 3000);
                        } catch (err) {
                            alert("System Error: Could not connect to server.");
                            resetUI();
                        }
                    },
                    (err) => { /* Ignore frequent scanning errors */ }
                );
            } catch (err) {
                console.error(err);
                alert("Camera Error: Please grant camera access.");
                resetUI();
            }
        }

        async function resetUI() {
            if (html5QrCode && html5QrCode.isScanning) {
                await html5QrCode.stop();
            }
            document.getElementById('reader').style.display = "none";
            document.getElementById('status').innerText = "Please select an action";
        }
    </script>
</body>
</html>
